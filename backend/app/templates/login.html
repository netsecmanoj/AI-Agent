{% extends "base.html" %}
{% block content %}
<section class="panel auth-panel">
  <div class="panel-header">
    <div>
      <p class="eyebrow">Platform Access</p>
      <h2>Sign in</h2>
    </div>
  </div>
  {% if error %}
  <p class="error-banner">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="next" value="{{ next }}">
    <label>
      Username
      <input type="text" name="username" autocomplete="username" required>
    </label>
    <label>
      Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Login</button>
  </form>
  {% if oidc_enabled %}
  <div class="stack top-gap">
    <p class="help-text">Single sign-on is available for organization accounts.</p>
    <a class="button-link button-secondary" href="/auth/oidc/login{% if next %}?next={{ next }}{% endif %}">Continue with SSO</a>
  </div>
  {% endif %}
</section>
{% endblock %}
